<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Destination Details – Incredible India</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body { background: var(--off-white); }

    .detail-hero {
      position: relative;
      height: 65vh;
      min-height: 420px;
      overflow: hidden;
    }
    .detail-hero img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .detail-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(13,35,64,0.35) 0%, rgba(13,35,64,0.85) 100%);
    }
    .detail-hero-content {
      position: absolute; bottom: 40px; left: 5%; right: 5%;
      color: #fff;
      animation: fadeUp 0.7s ease both;
    }
    .detail-hero-content h1 {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 900; margin-bottom: 8px;
    }
    .detail-hero-content p {
      font-size: 1.05rem; color: rgba(255,255,255,0.85);
    }
    .detail-badge-row {
      display: flex; gap: 12px; flex-wrap: wrap; margin-top: 14px;
    }
    .detail-badge {
      background: var(--saffron); color: #fff;
      padding: 5px 14px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 600;
    }
    .detail-badge.alt {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.4);
    }

    /* Back Button */
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--deep-blue); color: #fff;
      padding: 10px 20px; border-radius: 50px;
      font-weight: 600; font-size: 0.88rem;
      border: none; cursor: pointer;
      transition: var(--transition);
      position: absolute; top: 20px; left: 5%; z-index: 10;
    }
    .back-btn:hover { background: var(--saffron); }

    /* Detail Body */
    .detail-body {
      max-width: 1100px; margin: 0 auto;
      padding: 50px 5%;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 40px;
    }

    .detail-section { margin-bottom: 32px; }
    .detail-section h2 {
      font-family: var(--font-display);
      font-size: 1.5rem; color: var(--text);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--saffron);
      display: inline-block;
    }
    .detail-section p {
      color: var(--text-light); line-height: 1.8; font-size: 0.95rem;
    }

    /* Info Grid */
    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; margin-top: 10px;
    }
    .info-box {
      background: var(--card-bg);
      border-radius: var(--radius-sm);
      padding: 16px; box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 12px;
    }
    .info-box .ibox-icon {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, var(--saffron), var(--gold));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1rem; flex-shrink: 0;
    }
    .info-box .ibox-text { font-size: 0.82rem; }
    .info-box .ibox-text strong { display: block; color: var(--text); font-size: 0.9rem; }
    .info-box .ibox-text span { color: var(--text-light); }

    /* Highlights */
    .highlights-list {
      list-style: none; padding: 0; margin-top: 10px;
    }
    .highlights-list li {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      font-size: 0.9rem; color: var(--text-light);
    }
    .highlights-list li:last-child { border-bottom: none; }
    .highlights-list li i { color: var(--saffron); margin-top: 2px; }

    /* Booking Sidebar */
    .booking-sidebar {
      position: sticky; top: 90px;
      height: fit-content;
    }
    .booking-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-hover);
      padding: 28px; overflow: hidden;
    }
    .booking-card h3 {
      font-family: var(--font-display);
      font-size: 1.3rem; color: var(--text);
      margin-bottom: 6px;
    }
    .booking-card .bc-sub {
      color: var(--text-light); font-size: 0.85rem; margin-bottom: 20px;
    }
    .booking-card input,
    .booking-card textarea,
    .booking-card select {
      width: 100%; padding: 11px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
      font-size: 0.9rem;
      background: var(--card-bg); color: var(--text);
      font-family: var(--font-body);
      outline: none; transition: border-color 0.2s;
    }
    .booking-card input:focus,
    .booking-card textarea:focus,
    .booking-card select:focus { border-color: var(--saffron); }
    .booking-card textarea { resize: vertical; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .booking-card .form-msg {
      font-size: 0.82rem; text-align: center;
      margin-top: 6px;
    }
    .form-msg.error { color: #e74c3c; }
    .form-msg.success { color: #27ae60; }

    .bc-login-note {
      text-align: center; padding: 20px;
      background: var(--section-bg);
      border-radius: var(--radius-sm);
      font-size: 0.88rem; color: var(--text-light);
      margin-top: 10px;
    }
    .bc-login-note a {
      color: var(--saffron); font-weight: 600; cursor: pointer;
    }

    /* Related Packages */
    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px; margin-top: 14px;
    }
    .rel-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: var(--transition);
    }
    .rel-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
    .rel-card img { width: 100%; height: 150px; object-fit: cover; }
    .rel-card-body { padding: 14px; }
    .rel-card-body h4 {
      font-family: var(--font-display);
      font-size: 1rem; margin-bottom: 4px;
    }
    .rel-card-body p { font-size: 0.8rem; color: var(--text-light); margin-bottom: 8px; }
    .rel-card-body .rc-price {
      font-size: 1.1rem; font-weight: 700; color: var(--saffron);
    }

    /* Booking Confirmation Modal */
    .booking-success {
      text-align: center; padding: 20px;
    }
    .booking-success .success-icon { font-size: 3.5rem; margin-bottom: 12px; }
    .booking-success h3 {
      font-family: var(--font-display);
      font-size: 1.6rem; color: var(--text); margin-bottom: 8px;
    }
    .booking-success p { color: var(--text-light); margin-bottom: 6px; }
    .booking-ref {
      display: inline-block;
      background: var(--section-bg);
      color: var(--saffron); font-weight: 700;
      padding: 6px 16px; border-radius: 20px;
      font-size: 0.88rem; margin: 10px 0;
    }

    @media(max-width: 900px) {
      .detail-body { grid-template-columns: 1fr; }
      .booking-sidebar { position: static; }
      .info-grid { grid-template-columns: 1fr; }
    }
    @media(max-width: 600px) {
      .two-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Back Button -->
  <button class="back-btn" onclick="window.history.back()">
    <i class="fas fa-arrow-left"></i> Back
  </button>

  <!-- Dark Mode Toggle -->
  <button id="darkToggle" title="Toggle Dark Mode"><i class="fas fa-moon"></i></button>

  <!-- HERO -->
  <div class="detail-hero" id="detailHero">
    <img id="detailImg" src="" alt="Destination" />
    <div class="detail-hero-overlay"></div>
    <div class="detail-hero-content">
      <h1 id="detailName">Loading...</h1>
      <p id="detailState"></p>
      <div class="detail-badge-row" id="detailBadgeRow"></div>
    </div>
  </div>

  <!-- BODY -->
  <div class="detail-body">

    <!-- Left Content -->
    <div>
      <div class="detail-section">
        <h2>About This Destination</h2>
        <p id="detailDesc"></p>
      </div>

      <div class="detail-section">
        <h2>Quick Info</h2>
        <div class="info-grid" id="infoGrid"></div>
      </div>

      <div class="detail-section">
        <h2>Top Highlights</h2>
        <ul class="highlights-list" id="highlightsList"></ul>
      </div>

      <div class="detail-section" id="relatedSection">
        <h2>Related Packages</h2>
        <div class="related-grid" id="relatedGrid"></div>
      </div>
    </div>

    <!-- Right Sidebar – Booking -->
    <div class="booking-sidebar">
      <div class="booking-card">
        <h3>Book This Destination</h3>
        <p class="bc-sub" id="bcSub">Fill in your details to book now</p>

        <div id="bookingFormArea">
          <input type="text" id="sbName" placeholder="Full Name" required/>
          <input type="tel" id="sbPhone" placeholder="Mobile Number (10 digits)" required maxlength="10"/>
          <input type="text" id="sbCity" placeholder="City" required/>
          <textarea id="sbAddress" rows="3" placeholder="Full Address (at least 10 words)" required></textarea>
          <div class="two-col">
            <input type="number" id="sbGuests" placeholder="Guests" min="1" required/>
            <select id="sbMeals" required>
              <option value="">Meal Plan</option>
              <option value="With Meals">With Meals</option>
              <option value="Without Meals">Without Meals</option>
            </select>
          </div>
          <button class="btn-primary full-w" onclick="submitDetailBooking()">
            <i class="fas fa-check-circle"></i> Confirm Booking
          </button>
          <p class="form-msg" id="sbMsg"></p>
        </div>

        <div id="loginPrompt" style="display:none;">
          <div class="bc-login-note">
            Please <a onclick="goLoginMain()">Login</a> first to make a booking.
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Booking Confirmation Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <button class="modal-close" onclick="closeConfirm()"><i class="fas fa-times"></i></button>
      <div id="confirmContent"></div>
    </div>
  </div>

  <script>
    /* ========================
       DATA (same as main site)
       ======================== */
    const destinations = [
      { id: 1, name: "Goa", state: "Goa", desc: "Sun-kissed beaches, vibrant nightlife and Portuguese heritage await you. Goa is India's smallest state but bursting with character — from the golden sands of Calangute to the ancient Basilica of Bom Jesus, from the buzzing Saturday Night Market to the serene Dudhsagar Waterfalls. It's the perfect mix of relaxation and adventure.", image: "https://images.unsplash.com/photo-1512343879784-a960bf40e7f2?w=800", best: "Nov – Mar", badge: "Trending", category: "beach", highlights: ["Calangute & Baga Beach", "Basilica of Bom Jesus", "Dudhsagar Waterfalls", "Anjuna Flea Market", "Portuguese Architecture", "Water Sports & Parasailing"], bestTime: "November to March", temperature: "22°C – 35°C", language: "Konkani, English", cuisine: "Seafood, Goan Curry" },
      { id: 2, name: "Jaipur", state: "Rajasthan", desc: "The Pink City dazzles with majestic forts, palaces and bazaars. Jaipur is the royal gateway to Rajasthan — a city where history breathes through every stone. From the magnificent Amber Fort to the intricate Hawa Mahal, from colourful bazaars selling gems and handicrafts to the astronomical marvels of Jantar Mantar, Jaipur is truly India's heritage jewel.", image: "https://images.unsplash.com/photo-1599661046289-e31897846e41?w=800", best: "Oct – Mar", badge: "Heritage", category: "history", highlights: ["Amber Fort & Palace", "Hawa Mahal (Palace of Winds)", "City Palace Museum", "Jantar Mantar Observatory", "Nahargarh Fort Sunset", "Johari Bazaar Shopping"], bestTime: "October to March", temperature: "10°C – 30°C", language: "Hindi, Rajasthani", cuisine: "Dal Baati, Ghevar, Laal Maas" },
      { id: 3, name: "Rishikesh", state: "Uttarakhand", desc: "Yoga capital of the world — experience thrilling rafting on the Ganga. Rishikesh sits at the foothills of the Himalayas where the holy Ganges descends from the mountains. It's a place of spiritual awakening, extreme adventure, and deep tranquillity — all in one. From bungee jumping to sunset yoga, Rishikesh brings soul and adrenaline together beautifully.", image: "https://images.unsplash.com/photo-1582650625119-3a31f8fa2699?w=800", best: "Sep – Jun", badge: "Adventure", category: "adventure", highlights: ["Ganga River Rafting", "Bungee Jumping at Jumpin Heights", "Beatles Ashram Ruins", "Laxman Jhula & Ram Jhula", "Evening Ganga Aarti", "Neelkanth Mahadev Trek"], bestTime: "September to June", temperature: "14°C – 38°C", language: "Hindi", cuisine: "Sattvic food, Café culture" },
      { id: 4, name: "Leh", state: "Ladakh", desc: "Dramatic high-altitude landscapes, ancient monasteries and starry skies. Leh, at 3524 metres, is one of the most stunning places on earth. Vast moonscapes, turquoise lakes, ancient Buddhist monasteries and warm Ladakhi culture create an experience unlike anywhere else. The roads through Khardung La and along the Indus River are the stuff of legends.", image: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800", best: "May – Sep", badge: "Offbeat", category: "adventure", highlights: ["Pangong Tso Lake", "Khardung La Pass (5359m)", "Nubra Valley Camel Safari", "Hemis Monastery", "Magnetic Hill", "Zanskar River Rafting"], bestTime: "May to September", temperature: "-20°C to 25°C", language: "Ladakhi, Hindi", cuisine: "Thukpa, Momos, Butter Tea" },
      { id: 5, name: "Kerala", state: "South India", desc: "Backwaters, spice gardens and pristine beaches — God's Own Country. Kerala is a tropical paradise of swaying coconut palms, emerald backwaters, misty hill stations and golden beaches. From the tea gardens of Munnar to the houseboat cruises of Alleppey, from the wildlife of Thekkady to Kathakali dance performances — Kerala is pure enchantment.", image: "https://images.unsplash.com/photo-1602216056096-3b40cc0c9944?w=800", best: "Oct – Feb", badge: "Scenic", category: "nature", highlights: ["Alleppey Houseboat Cruise", "Munnar Tea Plantations", "Periyar Wildlife Sanctuary", "Fort Kochi Heritage Walk", "Kovalam Beach", "Kathakali Dance Performance"], bestTime: "October to February", temperature: "23°C – 32°C", language: "Malayalam", cuisine: "Appam, Fish Curry, Sadya" },
      { id: 6, name: "Varanasi", state: "Uttar Pradesh", desc: "One of the world's oldest cities — a spiritual awakening on the Ganges. Varanasi is the spiritual capital of India, a city that has been continuously inhabited since 3000 BC. The dawn boat rides along the Ghats, the Ganga Aarti ceremony, the narrow alleyways leading to ancient temples — Varanasi is an overwhelming, life-changing experience.", image: "https://images.unsplash.com/photo-1561361513-2d000a50f0dc?w=800", best: "Nov – Mar", badge: "Spiritual", category: "history", highlights: ["Dawn Boat Ride on Ganges", "Dashashwamedh Ghat Aarti", "Kashi Vishwanath Temple", "Sarnath Buddhist Site", "Old City Lane Walks", "Silk Weaving Workshops"], bestTime: "November to March", temperature: "5°C – 42°C", language: "Hindi, Bhojpuri", cuisine: "Banarasi Paan, Kachori Sabzi, Malaiyo" },
      { id: 7, name: "Manali", state: "Himachal Pradesh", desc: "Snow-capped peaks, adventure sports and lush Himalayan valleys. Manali is the crown jewel of Himachal Pradesh — a year-round destination that transforms from a lush valley in summer to a snow-covered wonderland in winter. It's equally beloved by honeymooners, backpackers and thrill-seekers for its natural beauty and thrilling adventures.", image: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800", best: "Oct – Jun", badge: "Hill Station", category: "hills", highlights: ["Solang Valley Snow Activities", "Rohtang Pass (3978m)", "Hadimba Temple Forest", "Old Manali Café Culture", "Beas River Riverside Walks", "Paragliding & Mountain Biking"], bestTime: "October to June", temperature: "-10°C to 25°C", language: "Hindi, Kullvi", cuisine: "Siddu, Trout Fish, Dham" },
      { id: 8, name: "Andaman", state: "Andaman & Nicobar", desc: "Crystal blue waters, coral reefs and untouched natural beauty. The Andaman Islands are India's tropical paradise — a collection of 572 islands with some of the world's finest beaches, pristine coral reefs, bioluminescent plankton bays and a rich history tied to the colonial era Cellular Jail.", image: "https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=800", best: "Oct – May", badge: "Island", category: "beach", highlights: ["Radhanagar Beach (Asia's Best)", "Scuba Diving & Snorkelling", "Elephant Beach Water Sports", "Cellular Jail Light & Sound Show", "Bioluminescent Plankton Night Tour", "Ross Island Historical Ruins"], bestTime: "October to May", temperature: "23°C – 30°C", language: "Hindi, Bengali, Tamil", cuisine: "Seafood, Coconut dishes" },
    ];

    const tourPackages = [
      { id: 1, name: "Romantic Goa Getaway", type: "honeymoon", image: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400", duration: "5D/4N", price: 18999, dest: "Goa" },
      { id: 2, name: "Rajasthan Royal Tour", type: "family", image: "https://images.unsplash.com/photo-1524492412937-b28074a5d7da?w=400", duration: "7D/6N", price: 32000, dest: "Jaipur" },
      { id: 3, name: "Leh Ladakh Expedition", type: "adventure", image: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400", duration: "8D/7N", price: 28500, dest: "Leh" },
      { id: 4, name: "Kerala Backwater Bliss", type: "honeymoon", image: "https://images.unsplash.com/photo-1602216056096-3b40cc0c9944?w=400", duration: "6D/5N", price: 22999, dest: "Kerala" },
      { id: 5, name: "Rishikesh Adventure Camp", type: "adventure", image: "https://images.unsplash.com/photo-1582650625119-3a31f8fa2699?w=400", duration: "4D/3N", price: 9999, dest: "Rishikesh" },
      { id: 6, name: "Golden Triangle Classic", type: "family", image: "https://images.unsplash.com/photo-1548013146-72479768bada?w=400", duration: "6D/5N", price: 16500, dest: "Jaipur" },
    ];

    /* ========================
       STATE
       ======================== */
    let currentUser = JSON.parse(localStorage.getItem("ii_user")) || null;
    let destData = null;
    let currentBookingItemName = '';
    let currentBookingPrice = 0;

    /* ========================
       DARK MODE
       ======================== */
    const saved = localStorage.getItem("ii_darkmode");
    if (saved === "true") {
      document.body.classList.add("dark");
      document.getElementById("darkToggle").innerHTML = '<i class="fas fa-sun"></i>';
    }
    document.getElementById("darkToggle").addEventListener("click", () => {
      document.body.classList.toggle("dark");
      const isDark = document.body.classList.contains("dark");
      localStorage.setItem("ii_darkmode", isDark);
      document.getElementById("darkToggle").innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    });

    /* ========================
       MODAL HELPERS
       ======================== */
    function closeConfirm() {
      document.getElementById("confirmModal").classList.remove("active");
      document.body.style.overflow = "";
    }
    document.getElementById("confirmModal").addEventListener("click", e => {
      if (e.target === document.getElementById("confirmModal")) closeConfirm();
    });

    /* ========================
       LOAD DESTINATION DATA
       ======================== */
    function loadDestination() {
      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get("id"));
      destData = destinations.find(d => d.id === id);
      if (!destData) {
        document.body.innerHTML = "<div style='text-align:center;padding:100px;font-family:sans-serif'><h2>Destination not found.</h2><a href='index.html'>← Go Back</a></div>";
        return;
      }

      document.title = destData.name + " – Incredible India";

      // Hero
      document.getElementById("detailImg").src = destData.image;
      document.getElementById("detailImg").alt = destData.name;
      document.getElementById("detailName").textContent = destData.name + ", " + destData.state;
      document.getElementById("detailState").textContent = destData.desc.substring(0, 80) + "...";

      // Badges
      const br = document.getElementById("detailBadgeRow");
      br.innerHTML = `
        <span class="detail-badge">${destData.badge}</span>
        <span class="detail-badge alt"><i class="fas fa-calendar-alt"></i> Best: ${destData.best}</span>
        <span class="detail-badge alt"><i class="fas fa-thermometer-half"></i> ${destData.temperature || "Varies"}</span>
        <span class="detail-badge alt"><i class="fas fa-utensils"></i> ${destData.cuisine || "Local Cuisine"}</span>
      `;

      // Description
      document.getElementById("detailDesc").textContent = destData.desc;

      // Info Grid
      const infoGrid = document.getElementById("infoGrid");
      infoGrid.innerHTML = `
        <div class="info-box"><div class="ibox-icon"><i class="fas fa-calendar"></i></div><div class="ibox-text"><strong>Best Time to Visit</strong><span>${destData.bestTime || destData.best}</span></div></div>
        <div class="info-box"><div class="ibox-icon"><i class="fas fa-thermometer-half"></i></div><div class="ibox-text"><strong>Temperature Range</strong><span>${destData.temperature || "N/A"}</span></div></div>
        <div class="info-box"><div class="ibox-icon"><i class="fas fa-language"></i></div><div class="ibox-text"><strong>Language Spoken</strong><span>${destData.language || "Hindi"}</span></div></div>
        <div class="info-box"><div class="ibox-icon"><i class="fas fa-utensils"></i></div><div class="ibox-text"><strong>Must Try Food</strong><span>${destData.cuisine || "Local Cuisine"}</span></div></div>
      `;

      // Highlights
      const hl = document.getElementById("highlightsList");
      if (destData.highlights && destData.highlights.length) {
        hl.innerHTML = destData.highlights.map(h => `
          <li><i class="fas fa-map-pin"></i> ${h}</li>
        `).join("");
      }

      // Related Packages
      const related = tourPackages.filter(p => p.dest === destData.name);
      const rg = document.getElementById("relatedGrid");
      if (related.length) {
        rg.innerHTML = related.map(p => `
          <div class="rel-card">
            <img src="${p.image}" alt="${p.name}" loading="lazy"/>
            <div class="rel-card-body">
              <h4>${p.name}</h4>
              <p><i class="fas fa-clock" style="color:var(--saffron)"></i> ${p.duration}</p>
              <div class="rc-price">₹${p.price.toLocaleString("en-IN")} <span style="font-size:0.7rem;color:var(--text-light);font-weight:400;">per person</span></div>
              <button class="btn-sm" style="margin-top:10px;width:100%;" onclick="setBookingItem('${p.name}', ${p.price})">
                Book This Package
              </button>
            </div>
          </div>
        `).join("");
      } else {
        document.getElementById("relatedSection").style.display = "none";
      }

      // Booking sidebar
      currentBookingItemName = destData.name + " Destination";
      currentBookingPrice = 0;
      document.getElementById("bcSub").textContent = "Book your visit to " + destData.name;

      // Show/hide booking form based on login
      checkLoginState();
    }

    function setBookingItem(name, price) {
      currentBookingItemName = name;
      currentBookingPrice = price;
      document.getElementById("bcSub").textContent = name + " – ₹" + price.toLocaleString("en-IN");
      document.getElementById("sbName").scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function checkLoginState() {
      const bookingFormArea = document.getElementById("bookingFormArea");
      const loginPrompt = document.getElementById("loginPrompt");
      if (currentUser) {
        bookingFormArea.style.display = "block";
        loginPrompt.style.display = "none";
      } else {
        bookingFormArea.style.display = "none";
        loginPrompt.style.display = "block";
      }
    }

    function goLoginMain() {
      window.location.href = "index.html#packages";
    }

    /* ========================
       SUBMIT BOOKING
       ======================== */
    async function submitDetailBooking() {
      if (!currentUser) {
        alert("Please login first to book!");
        return;
      }
      const name = document.getElementById("sbName").value.trim();
      const phone = document.getElementById("sbPhone").value.trim();
      const city = document.getElementById("sbCity").value.trim();
      const address = document.getElementById("sbAddress").value.trim();
      const guestCount = document.getElementById("sbGuests").value;
      const meals = document.getElementById("sbMeals").value;
      const msg = document.getElementById("sbMsg");

      if (!name || !phone || !city || !address || !guestCount || !meals) {
        msg.textContent = "Please fill all fields.";
        msg.className = "form-msg error";
        return;
      }
      if (!/^\d{10}$/.test(phone)) {
        msg.textContent = "Phone number must be exactly 10 digits.";
        msg.className = "form-msg error";
        return;
      }
      const wordCount = address.split(/\s+/).filter(w => w.length > 0).length;
      if (address.length < 10) {
        msg.textContent = "Address must be at least 10 characters long.";
        msg.className = "form-msg error";
        return;
      }

      msg.textContent = "Processing booking...";
      msg.className = "form-msg";

      try {
        const res = await fetch('/api/bookings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: currentUser.id,
            type: 'destination',
            itemName: currentBookingItemName,
            price: currentBookingPrice || 0,
            name, phone, city, address, guestCount, meals
          })
        });
        const data = await res.json();
        if (data.success) {
          msg.textContent = "";
          showConfirmation(data.booking);
          // Reset form
          ["sbName","sbPhone","sbCity","sbAddress","sbGuests"].forEach(id => document.getElementById(id).value = "");
          document.getElementById("sbMeals").value = "";
        } else {
          msg.textContent = data.message || "Booking failed.";
          msg.className = "form-msg error";
        }
      } catch(err) {
        msg.textContent = "Server error. Is the backend running?";
        msg.className = "form-msg error";
      }
    }

    function showConfirmation(booking) {
      document.getElementById("confirmContent").innerHTML = `
        <div class="booking-success">
          <div class="success-icon">🎉</div>
          <h3>Booking Confirmed!</h3>
          <p>Thank you, <strong>${booking.name}</strong>!</p>
          <p>Your booking for <strong>${booking.itemName}</strong> is confirmed.</p>
          <div class="booking-ref">Ref: ${(booking._id || "").slice(-6).toUpperCase()}</div>
          <p>Guests: ${booking.guestCount} | Meals: ${booking.meals}</p>
          <p style="margin-top:14px;color:var(--text-light);font-size:0.82rem;">Details saved to your profile.</p>
          <button class="btn-primary full-w" style="margin-top:20px;" onclick="closeConfirm()">Done</button>
        </div>`;
      document.getElementById("confirmModal").classList.add("active");
      document.body.style.overflow = "hidden";
    }

    // Init
    loadDestination();
  </script>
</body>
